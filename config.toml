[server]
host = "0.0.0.0"
port = 8081
max_connections = 8
idle_timeout_secs = 300

[asr]
# Model type options:
#   "zipformer"   — encoder+decoder+joiner transducer model (e.g., zipformer-zh-14m)
#   "sense_voice" — single model file, multilingual (中文/英/日/韩/粤)
model_type = "zipformer"
encoder = "/opt/voice-server/models/asr/encoder.onnx"
decoder = "/opt/voice-server/models/asr/decoder.onnx"
joiner = "/opt/voice-server/models/asr/joiner.onnx"
tokens = "/opt/voice-server/models/asr/tokens.txt"
num_threads = 2
provider = "cpu"

[tts]
# Model type options:
#   "vits"       — VITS-based models (Melo, zh-ll, aishell3, etc.)
#   "matcha"     — Matcha-TTS
#   "kokoro"     — Kokoro TTS
#   "pocket"     — Pocket TTS (edge-tts compatible)
model_type = "vits"
model = "/opt/voice-server/models/tts/model.onnx"
tokens = "/opt/voice-server/models/tts/tokens.txt"
# Lexicon file (required for VITS Chinese models)
lexicon = "/opt/voice-server/models/tts/lexicon.txt"
num_threads = 1
provider = "cpu"

# ── TTS Model Profiles ────────────────────────────────────────
# Uncomment the profile for the model you downloaded, then comment out the
# default [tts] paths above, OR just run install.sh to auto-configure.
#
# vits-melo-zh-en (1 speaker, Chinese+English):
#   model      = "/opt/voice-server/models/tts/model.onnx"
#   tokens     = "/opt/voice-server/models/tts/tokens.txt"
#   lexicon    = "/opt/voice-server/models/tts/lexicon.txt"
#
# zh-ll (5 speakers sid 0~4, Chinese only):
#   model      = "/opt/voice-server/models/tts/model.onnx"
#   tokens     = "/opt/voice-server/models/tts/tokens.txt"
#   lexicon    = "/opt/voice-server/models/tts/lexicon.txt"
#   # Use --voice <sid> with client to select speaker
#
# aishell3 (174 speakers sid 0~173, Chinese only):
#   model      = "/opt/voice-server/models/tts/model.onnx"
#   tokens     = "/opt/voice-server/models/tts/tokens.txt"
#   lexicon    = "/opt/voice-server/models/tts/lexicon.txt"
#   # Has speakers.txt in tts/ directory with speaker names

[vad]
model = "/opt/voice-server/models/vad/silero_vad.onnx"
threshold = 0.5
min_speech_duration_ms = 100
min_silence_duration_ms = 500
window_size = 512
