[server]
host = "0.0.0.0"
port = 8081
max_connections = 8
idle_timeout_secs = 300

[asr]
# Model type options:
#   "zipformer"   — encoder+decoder+joiner transducer model (e.g., zipformer-zh-14m)
#   "sense_voice" — single model file, multilingual (中文/英/日/韩/粤)
model_type = "zipformer"
encoder = "/opt/voice-server/models/asr/encoder.onnx"
decoder = "/opt/voice-server/models/asr/decoder.onnx"
joiner = "/opt/voice-server/models/asr/joiner.onnx"
tokens = "/opt/voice-server/models/asr/tokens.txt"
num_threads = 2
provider = "cpu"

[tts]
# Model type options:
#   "vits"       — VITS-based models (Melo, LJSpeech, etc.)
#   "matcha"     — Matcha-TTS
#   "kokoro"     — Kokoro TTS
#   "pocket"     — Pocket TTS (edge-tts compatible)
model_type = "vits"
model = "/opt/voice-server/models/tts/model.onnx"
tokens = "/opt/voice-server/models/tts/tokens.txt"
# Lexicon file (required for some VITS models like vits-melo-tts-zh_en)
lexicon = "/opt/voice-server/models/tts/lexicon.txt"
# Data directory containing dict/ subfolder and .fst files (Jieba + text normalization)
# Required for Melo TTS zh-en model. Auto-detected from model path if not set.
data_dir = "/opt/voice-server/models/tts"
num_threads = 1
provider = "cpu"

[vad]
model = "/opt/voice-server/models/vad/silero_vad.onnx"
threshold = 0.5
min_speech_duration_ms = 100
min_silence_duration_ms = 500
window_size = 512
